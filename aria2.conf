# ==========================================
# Aria2c Configuration for JAV Auto Importer
# ==========================================

# -----------------
# RPC Setting
# -----------------
enable-rpc=true
rpc-allow-origin-all=true
rpc-listen-all=true
rpc-listen-port=6800
# rpc-secret 通过 docker-compose.yaml 的 ARIA2_RPC_SECRET 环境变量传入

# -----------------
# Download & Connection
# -----------------
continue=true
max-concurrent-downloads=5
max-connection-per-server=16
min-split-size=10M
split=16
disable-ipv6=false

# -----------------
# BT/PT Downloading
# -----------------
# DHT (Important for magnet links)
enable-dht=true
enable-dht6=true
dht-listen-port=6881-6999
dht-entry-point=dht.transmissionbt.com:6881
dht-entry-point6=dht.transmissionbt.com:6881

# PEX & Local Discovery
enable-peer-exchange=true
bt-enable-lpd=true

# Ports
listen-port=51413

# Other BT settings
bt-seed-unverified=true
bt-save-metadata=true
bt-max-peers=100
bt-tracker-connect-timeout=15
bt-tracker-timeout=15

# -----------------
# Save Session
# -----------------
input-file=/app/config/aria2.session
save-session=/app/config/aria2.session
save-session-interval=60
